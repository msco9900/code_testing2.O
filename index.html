<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>AHYPAR Administration</title>  
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>  
        :root {
            --primary-gold: #FFD700;
            --dark-gold: #B8860B;
            --bg-black: #0A0B10;
            --card-bg: rgba(26, 29, 41, 0.9);
            --text-white: #F0F0F0;
            --glass-border: rgba(255, 215, 0, 0.2);
            --danger-red: #FF4B4B;
            --success-green: #00E676;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }  
        body { background: radial-gradient(circle at top, #1a1d29 0%, #0a0b10 100%); color: var(--text-white); min-height: 100vh; }
        .hidden { display: none !important; }  

        header { background: rgba(10, 11, 16, 0.95); border-bottom: 1px solid var(--primary-gold); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .golden-text { background: linear-gradient(to right, #FFD700, #FDB931, #9f7928); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .container { padding: 15px; max-width: 500px; margin: auto; }  

        .card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); position: relative;}
        input, select, textarea { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid #333; border-radius: 12px; color: white; padding: 12px; margin: 8px 0; }
        button { width: 100%; background: linear-gradient(45deg, var(--dark-gold), var(--primary-gold)); color: black; font-weight: bold; border-radius: 12px; border: none; padding: 12px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin: 8px 0; }

        .menu-overlay { position: fixed; top: 0; right: 0; width: 85%; max-width: 300px; height: 100%; background: rgba(10, 11, 16, 0.98); border-left: 2px solid var(--primary-gold); z-index: 2000; transform: translateX(100%); transition: 0.3s; padding: 20px; }  
        .menu-overlay.active { transform: translateX(0); }  
        .menu-item { padding: 16px; border-bottom: 1px solid rgba(255,215,0,0.1); font-weight: bold; cursor: pointer; color: var(--text-white); }  

        .tag-span { color: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; font-weight: bold; vertical-align: middle;}
        .role-btn { width: auto; padding: 5px 10px; font-size: 10px; background: #333; color: #ccc; margin-right: 2px; border:none; border-radius:4px; margin-top: 5px; text-transform: none;}  
        .active-role { background: var(--primary-gold) !important; color: black !important; }  
        
        /* Drag Handle */
        .drag-handle { cursor: move; color: var(--primary-gold); margin-right: 10px; display: inline-block; }
        .reset-btn { background: #555; color: white; font-size: 9px; padding: 4px 8px; margin-left: 5px;}

        /* Chat */
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 180px); }
        .chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 12px; max-width: 85%; font-size: 13px; position: relative; }
        .msg-self { align-self: flex-end; background: var(--dark-gold); color: black; }
        .msg-other { align-self: flex-start; background: #2a2d39; color: white; }
    </style>
</head>  
<body>  

<div id="login-view" class="container">  
    <div class="card" style="text-align: center; margin-top: 50px;">  
        <h2 class="golden-text">Admin Login</h2>  
        <input type="password" id="login-pass" placeholder="Enter Passcode">  
        <button onclick="app.login()">Login</button>  
    </div>  
</div>  

<div id="dashboard-view" class="hidden">  
    <header>  
        <div><span class="golden-text">AHYPAR ADMIN</span><br><small id="h-user"></small></div>  
        <button onclick="app.toggleMenu(true)" style="width:auto; background:none; color:var(--primary-gold); font-size:24px;">☰</button>  
    </header>  

    <div id="menu-overlay" class="menu-overlay">  
        <button onclick="app.toggleMenu(false)" style="background:var(--danger-red); margin-bottom:15px; color:white;">Close</button>  
        <div class="menu-item" onclick="app.nav('profile')">👤 My Profile</div>  
        <div class="menu-item" onclick="app.nav('rules')">📜 App Rules</div>  
        <div class="menu-item" onclick="app.nav('curr-admins')">👥 Current Admin</div>  
        <div class="menu-item section-view hidden" onclick="app.nav('weekly')">📝 Weekly Reports</div>  
        <div class="menu-item" onclick="app.nav('promo')">🎖️ Leader Board </div>  
        <div class="menu-item section-view hidden" onclick="app.nav('stored')">📁 Store Files</div>  
        <div class="menu-item section-hr hidden" onclick="app.nav('access')">🔐 Manage Requests</div>  
        <div class="menu-item" onclick="app.nav('chat')">💬 Chat</div>  
        <div class="menu-item" onclick="app.logout()" style="color:var(--danger-red)">Logout</div>  
    </div>  
    <div class="container" id="screen"></div>  
</div>  

<script>  
    const firebaseConfig = {
      apiKey: "AIzaSyCt-o3cjOqzdTZKudMGTsd54TRnjlTRe8Y",
      authDomain: "ahypar-admin-0904.firebaseapp.com",
      databaseURL: "https://ahypar-admin-0904-default-rtdb.firebaseio.com",
      projectId: "ahypar-admin-0904",
      storageBucket: "ahypar-admin-0904.firebasestorage.app",
      messagingSenderId: "33988035579",
      appId: "1:33988035579:web:f3565dd45db9c0117f415e",
      measurementId: "G-9KMB0GK6F7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(); 

    const app = {  
        data: { ownerKey: '27052011', admins: [], lbStatus: 'closed', lbFileIndex: -1, ownerInfo: {tag: 'OWNER', tagColor: '#d4af37', boxColor: '#fff8dc'} },  
        user: null,  

        init() {  
            db.ref('ahypar_new_data').on('value', (snap) => {  
                const cloud = snap.val();  
                if (cloud) this.data = cloud;  
                if(this.user) this.showDash();  
            });  
        },  

        save() { db.ref('ahypar_new_data').set(this.data); },  

        login() {  
            const val = document.getElementById('login-pass').value;  
            if (val === this.data.ownerKey) this.user = { name: "Shafin_Mirza", role: 'owner', lvl: 'Owner' };  
            else {  
                const a = (this.data.admins || []).find(x => x.passcode === val);  
                if (!a) return alert("Invalid Passcode");  
                this.user = a;  
            }  
            this.showDash();  
            this.nav('profile');  
        },  

        showDash() {  
            document.getElementById('login-view').classList.add('hidden');  
            document.getElementById('dashboard-view').classList.remove('hidden');  
            document.getElementById('h-user').innerText = this.user.name + " (" + this.user.lvl + ")";  
            const r = this.user.role;  
            document.querySelectorAll('.menu-item').forEach(el => {  
                if(el.classList.contains('section-view') || el.classList.contains('section-hr')) el.classList.add('hidden');  
            });  
            if(['owner', 'high_command', 'editor', 'hr'].includes(r)) document.querySelectorAll('.section-view, .section-hr').forEach(el => el.classList.remove('hidden'));  
        },  

        nav(page) {  
            this.toggleMenu(false);  
            const area = document.getElementById('screen');  
            let html = '';  

            switch(page) {  
                case 'profile':  
                    html = `<div class="card" style="text-align:center"><h3>${this.user.name}</h3><p>${this.user.lvl}</p></div>`;  
                    break;  

                case 'curr-admins':
                    html = `<h3>Current Admins</h3><div id="admin-list">`;
                    const isOwner = this.user.role === 'owner';
                    
                    // Owner Card
                    let o = this.data.ownerInfo || {tag: 'OWNER', tagColor: '#d4af37', boxColor: '#fff8dc'};
                    html += `<div class="card" style="background:${o.boxColor}; color: black;">
                        <b>Shafin_Mirza</b> <span class="tag-span" style="background:${o.tagColor}">${o.tag}</span>
                        ${isOwner ? `<div style="margin-top:10px;"><input id="ow-t" value="${o.tag}" style="width:30%; color:black"><input type="color" id="ow-tc" value="${o.tagColor}" style="width:40px"><input type="color" id="ow-bc" value="${o.boxColor}" style="width:40px"><button class="role-btn" onclick="app.setOwnerStyle()">Save</button><button class="role-btn reset-btn" onclick="app.resetOwnerStyle()">Default</button></div>` : ''}
                    </div>`;

                    (this.data.admins || []).forEach((a, i) => {
                        html += `<div class="card admin-item" data-id="${i}" style="background:${a.boxColor || 'var(--card-bg)'}; color: ${a.boxColor ? 'black' : 'white'}">
                            ${isOwner ? '<span class="drag-handle">☰</span>' : ''}
                            <b>${a.name}</b> ${a.tag ? `<span class="tag-span" style="background:${a.tagColor}">${a.tag}</span>` : ''}
                            <br><small>${a.lvl}</small>`;
                        
                        if(isOwner) {
                            html += `<div style="margin-top:10px;">
                                <input id="tag-n-${i}" value="${a.tag||''}" placeholder="Tag" style="width:25%; color:black">
                                <input type="color" id="tag-c-${i}" value="${a.tagColor||'#555'}">
                                <input type="color" id="box-c-${i}" value="${a.boxColor||'#1a1d29'}">
                                <button class="role-btn" onclick="app.saveAdminStyle(${i})">Save</button>
                                <button class="role-btn reset-btn" onclick="app.resetAdminStyle(${i})">Default</button>
                                <button class="role-btn" style="background:red; color:white" onclick="app.kick(${i})">Kick</button>
                                <button class="role-btn ${a.role==='high_command'?'active-role':''}" onclick="app.setRole(${i},'high_command')">HC</button>
                            </div>`;
                        }
                        html += `</div>`;
                    });
                    html += `</div>`;
                    area.innerHTML = html;
                    if(isOwner) this.initDrag();
                    return;

                case 'promo':
                    html = `<h3>Leader Board</h3>`;
                    if(['owner', 'high_command'].includes(this.user.role)) {
                        const history = this.data.history || [];
                        html += `<div class="card"><select id="lb-file-select">${history.map((h,i)=>`<option value="${i}">${h.title}</option>`)}</select>
                        <button onclick="app.setLBStatus('published_hc')">Result HC (Priv)</button>
                        <button onclick="app.setLBStatus('published_public')">Result Public</button>
                        <button onclick="app.setLBStatus('closed')">Close</button></div>`;
                    }
                    html += `<div id="promo-res"></div>`;
                    area.innerHTML = html;
                    this.renderLB();
                    return;

                case 'chat':
                    html = `<h3>Staff Chat</h3><div class="chat-container"><div id="chat-box" class="chat-messages"></div><div style="display:flex; gap:5px;"><input id="chat-in"><button onclick="app.sendChat()" style="width:80px">Send</button></div></div>`;
                    area.innerHTML = html;
                    this.initChat();
                    return;
            }
            area.innerHTML = html;
        },

        initDrag() {
            const el = document.getElementById('admin-list');
            Sortable.create(el, {
                handle: '.drag-handle',
                animation: 150,
                onEnd: (evt) => {
                    const item = this.data.admins.splice(evt.oldIndex - 1, 1)[0]; // -1 because of owner card
                    this.data.admins.splice(evt.newIndex - 1, 0, item);
                    this.save();
                }
            });
        },

        setLBStatus(status) {
            this.data.lbStatus = status;
            this.data.lbFileIndex = parseInt(document.getElementById('lb-file-select').value);
            this.save();
            alert("Status Updated: " + status);
            this.renderLB();
        },

        renderLB() {
            const div = document.getElementById('promo-res');
            if(!div) return;
            
            // Privacy Logic
            if(this.data.lbStatus === 'published_hc') {
                if(!['owner', 'high_command'].includes(this.user.role)) {
                    div.innerHTML = "<p style='text-align:center; color:orange;'>Restricted: Only High Command can view this result.</p>";
                    return;
                }
            } else if(this.data.lbStatus === 'closed') {
                div.innerHTML = "<p style='text-align:center; color:grey;'>Leader Board Closed.</p>";
                return;
            }

            const file = (this.data.history || [])[this.data.lbFileIndex];
            if(!file) return;
            div.innerHTML = `<h4>Result: ${file.title}</h4>` + file.logs.map(l=>`<div class="card"><b>${l.n}</b>: ${l.pts} Pts</div>`).join('');
        },

        setOwnerStyle() {
            this.data.ownerInfo = { tag: document.getElementById('ow-t').value, tagColor: document.getElementById('ow-tc').value, boxColor: document.getElementById('ow-bc').value };
            this.save(); this.nav('curr-admins');
        },
        resetOwnerStyle() {
            this.data.ownerInfo = { tag: 'OWNER', tagColor: '#d4af37', boxColor: '#fff8dc' };
            this.save(); this.nav('curr-admins');
        },
        saveAdminStyle(i) {
            const a = this.data.admins[i];
            a.tag = document.getElementById(`tag-n-${i}`).value;
            a.tagColor = document.getElementById(`tag-c-${i}`).value;
            a.boxColor = document.getElementById(`box-c-${i}`).value;
            this.save(); this.nav('curr-admins');
        },
        resetAdminStyle(i) {
            const a = this.data.admins[i];
            delete a.tag; delete a.tagColor; delete a.boxColor;
            this.save(); this.nav('curr-admins');
        },
        setRole(i, r) { this.data.admins[i].role = r; this.save(); this.nav('curr-admins'); },
        kick(i) { if(confirm("Kick?")) { this.data.admins.splice(i,1); this.save(); this.nav('curr-admins'); } },
        initChat() {
            db.ref('staff_chat').on('value', (s) => {
                const b = document.getElementById('chat-box'); if(!b) return;
                const m = s.val() || {};
                b.innerHTML = Object.values(m).map(x=>`<div class="msg ${x.user===this.user.name?'msg-self':'msg-other'}"><small>${x.user}</small><br>${x.text}</div>`).join('');
                b.scrollTop = b.scrollHeight;
            });
        },
        sendChat() {
            const i = document.getElementById('chat-in');
            if(i.value) db.ref('staff_chat').push({user: this.user.name, text: i.value});
            i.value = '';
        },
        toggleMenu(s) { document.getElementById('menu-overlay').classList.toggle('active', s); },  
        logout() { location.reload(); }  
    };  
    app.init();  
</script>  
</body>  
</html>
