<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHYPAR | OFFICIAL ARENA</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --magenta: #ff0055;
            --dark: #050505;
            --panel: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; scroll-behavior: smooth; }
        body { background: var(--dark); color: white; overflow-x: hidden; line-height: 1.6; }

        /* Navigation */
        nav { background: #000; padding: 15px; border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: center; gap: 15px; }
        nav a { color: var(--cyan); text-decoration: none; font-family: 'Bebas Neue'; font-size: 1.2rem; }

        /* 3-Line Menu Styling */
        .menu-icon { position: fixed; top: 15px; right: 20px; z-index: 2000; font-size: 2rem; color: var(--cyan); cursor: pointer; }
        .side-menu { position: fixed; top: 0; right: -100%; width: 250px; height: 100%; background: #000; z-index: 1999; transition: 0.5s; padding-top: 80px; border-left: 2px solid var(--cyan); }
        .side-menu.active { right: 0; }
        .side-menu button { display: block; padding: 15px; color: #fff; background: none; border: none; width: 100%; text-align: left; cursor: pointer; font-family: 'Bebas Neue'; font-size: 1.5rem; }

        /* Hero & Sections */
        .hero { height: 75vh; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueW94bmZ6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R/l41lTfO3yJjH3R7bi/giphy.gif'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Bebas Neue'; font-size: 5.5rem; color: #fff; text-shadow: 0 0 20px var(--cyan); }
        .btn-join { display: inline-block; padding: 18px 50px; background: var(--cyan); color: #000; text-decoration: none; font-family: 'Bebas Neue'; font-size: 1.8rem; font-weight: bold; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: 0.3s; }

        .container { padding: 60px 20px; }
        .sec-title { font-family: 'Bebas Neue'; font-size: 3.2rem; color: var(--cyan); margin-bottom: 30px; border-left: 8px solid var(--magenta); padding-left: 15px; }

        .game-grid { display: grid; gap: 35px; margin-bottom: 50px; }
        .game-item { background: var(--panel); padding: 15px; border-radius: 20px; border: 1px solid #222; }
        .game-card { height: 200px; border-radius: 15px; background-size: cover; background-position: center; position: relative; }
        .overlay h4 { font-family: 'Bebas Neue'; font-size: 2rem; position: absolute; bottom: 15px; left: 15px; }

        /* Chat UI (Messenger Style) */
        #chat-window { display: none; position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px; background: #111; border: 1px solid var(--cyan); z-index: 2000; flex-direction: column; border-radius: 10px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; }
        .msg { margin: 5px 0; padding: 8px; border-radius: 10px; font-size: 0.9rem; max-width: 80%; }
        .sent { background: var(--cyan); color: #000; align-self: flex-end; margin-left: auto; }
        .received { background: #333; color: #fff; }

        /* Editor Modal */
        #editorModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; padding: 50px 20px; }
        textarea { width: 100%; height: 200px; background: #222; color: #fff; padding: 10px; border: 1px solid var(--cyan); }

        .mgmt-card { background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid var(--cyan); }
    </style>
</head>
<body>

    <div class="menu-icon" onclick="toggleMenu()">☰</div>
    <nav class="side-menu" id="sideMenu">
        <button id="authBtn" onclick="handleAuth()">LOGIN / SIGNUP</button>
        <button id="chatLink" style="display:none;" onclick="toggleChat()">REALTIME CHAT</button>
        <div id="adminOptions" style="display:none;">
            <button onclick="openEditor()">EDIT PAGE CONTENT</button>
            <button onclick="alert('Access Manager Opening...')">MANAGE ACCESS</button>
        </div>
    </nav>

    <header class="hero">
        <h1>AHYPAR</h1>
        <p>THE NEXT GEN MOBILE ESPORTS</p>
        <a href="https://discord.com/invite/kyv3NZebp3" target="_blank" class="btn-join">JOIN DISCORD</a>
    </header>

    <main class="container">
        <section id="about">
            <h2 class="sec-title">OUR MISSION</h2>
            <div class="about-wrap">
                <p id="aboutText">Welcome to <b>AHYPAR ESPORTS</b>, the most aggressive and professionally managed mobile gaming arena.</p>
            </div>
        </section>

        <section id="games">
            <h2 class="sec-title">ACTIVE ARENAS</h2>
            <div class="game-grid">
                <div class="game-item">
                    <div class="game-card" style="background-image: url('https://firebasestorage.googleapis.com/v0/b/ahypar-officials.firebasestorage.app/o/BGMI.jpeg?alt=media');">
                        <div class="overlay"><h4>BGMI MOBILE</h4></div>
                    </div>
                </div>
                <div class="game-item">
                    <div class="game-card" style="background-image: url('https://firebasestorage.googleapis.com/v0/b/ahypar-officials.firebasestorage.app/o/Free%20Fire.jpeg?alt=media');">
                        <div class="overlay"><h4>FREE FIRE</h4></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="mgmt">
            <h2 class="sec-title">LEADERSHIP</h2>
            <div id="leadershipContent">
                <div class="mgmt-card"><span>Founder / Owner</span><h4>Conor Yadav</h4></div>
                <div class="mgmt-card" style="border-color: var(--magenta);"><span>Chief Developer</span><h4>Shafin Mirza</h4></div>
            </div>
        </section>
    </main>

    <div id="chat-window">
        <div style="background:var(--cyan); color:#000; padding:10px;">CHAT ARENA</div>
        <div id="chat-messages" style="display:flex; flex-direction:column;"></div>
        <div style="display:flex; padding:5px; border-top:1px solid #333;">
            <input type="text" id="chatInput" style="flex:1; background:#000; color:#fff; border:none; padding:5px;">
            <button onclick="sendMessage()" style="background:var(--cyan); border:none; padding:5px 10px;">SEND</button>
        </div>
    </div>

    <div id="editorModal">
        <h2 style="color:var(--cyan)">Admin Editor</h2>
        <textarea id="editArea" placeholder="Edit About Us or Leaderboard text..."></textarea>
        <button onclick="saveEdit()" style="background:var(--cyan); padding:10px; width:100%; border:none; margin-top:10px;">SAVE CHANGES</button>
        <button onclick="document.getElementById('editorModal').style.display='none'" style="background:#555; padding:5px; width:100%; border:none; margin-top:5px; color:#fff;">CANCEL</button>
    </div>

    <script>
        // তোমার Firebase Config (v8 Compat Mode)
        const firebaseConfig = {
            apiKey: "AIzaSyCvMfjlnfmCi9gAkb1x4fwGYKhsvXmqlMw",
            authDomain: "ahypar-officials.firebaseapp.com",
            projectId: "ahypar-officials",
            storageBucket: "ahypar-officials.firebasestorage.app",
            messagingSenderId: "950529617176",
            appId: "1:950529617176:web:f501cb576fd3da98e5026d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let userEmail = "";

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

        // Login Logic
        function handleAuth() {
            const email = prompt("Enter Email:");
            const pass = prompt("Enter Password:");
            if(!email || !pass) return;

            userEmail = email;
            document.getElementById('authBtn').innerText = email.split('@')[0].toUpperCase();
            document.getElementById('chatLink').style.display = 'block';

            if(email === "shafinmirza59@gmail.com" && pass === "27052011@") {
                document.getElementById('adminOptions').style.display = 'block';
                alert("Master Access Granted!");
            }
        }

        // Chat Logic
        function toggleChat() {
            const chat = document.getElementById('chat-window');
            chat.style.display = chat.style.display === 'flex' ? 'none' : 'flex';
            loadChats();
        }

        function sendMessage() {
            const txt = document.getElementById('chatInput').value;
            if(!txt) return;
            db.ref('chats').push({ user: userEmail.split('@')[0], msg: txt });
            document.getElementById('chatInput').value = "";
        }

        function loadChats() {
            db.ref('chats').limitToLast(15).on('value', snap => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(child => {
                    const data = child.val();
                    box.innerHTML += `<div class="msg ${data.user === userEmail.split('@')[0] ? 'sent' : 'received'}"><b>${data.user}:</b> ${data.msg}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // Admin Edit Logic
        function openEditor() {
            document.getElementById('editorModal').style.display = 'block';
            document.getElementById('editArea').value = document.getElementById('aboutText').innerText;
        }

        function saveEdit() {
            const newText = document.getElementById('editArea').value;
            db.ref('siteData/about').set(newText);
            document.getElementById('editorModal').style.display = 'none';
        }

        // Live Data Sync (সবার ফোনে অটো আপডেট হবে)
        db.ref('siteData/about').on('value', snap => {
            if(snap.val()) document.getElementById('aboutText').innerText = snap.val();
        });
    </script>
</body>
</html>
